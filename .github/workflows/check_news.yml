name: Check and Publish News

on:
  schedule:
    # Run every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push the updated database file back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news checker once
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: sqlite+aiosqlite:///./news.db
          POLL_INTERVAL_HOURS: 3.0
          RUN_ONCE: "true"
        run: python -m app.main

      - name: Commit and push database changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add the database file
          git add news.db
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "chore: update database with published articles [skip ci]"
            git push
          fi
